name: Update Weather Data

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install jinja2
      - name: Build static weather pages
        run: python3 scripts/build.py
        env:
          SITE_URL: https://weatherindex.xyz
          WEATHER_FETCH_WORKERS: "4"
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          VISUALCROSSING_KEY: ${{ secrets.VISUALCROSSING_KEY }}
          WEATHERBIT_API_KEY: ${{ secrets.WEATHERBIT_API_KEY }}
      - name: Commit generated update
        run: |
          git config user.name "WeatherBot"
          git config user.email "bot@weatherindex.xyz"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: weather update $(date -u +%Y-%m-%d-%H%M)"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"
      - id: deployment
        uses: actions/deploy-pages@v4
