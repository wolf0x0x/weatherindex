name: Update Weather Data

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install jinja2
      - name: Build static weather pages
        run: python3 scripts/build.py
      - name: Commit generated update
        run: |
          git config user.name "WeatherBot"
          git config user.email "bot@globalweather.io"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: weather update $(date -u +%Y-%m-%d-%H%M)"
          git push
